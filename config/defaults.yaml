# Pipeline defaults (override per run via CLI)

preprocess:
  terminal_assignment_strategy: balanced  # balanced | shortest
  poisson_depth: 12
  align_head: true
  electrode_spacing: 4.5
  full_circle: false

synthesize:
  assignments: subject1_best_v4  # data/presets/{name}.json — terminal LEFT/RIGHT map
  use_target_terminals: true
  optimize_terminals: false
  preserve_entry_order: false
  uv_resolution: 100
  terminal_stop_mm: 20.0  # shorten each wire before strip entry (0 = off)
  terminal_min_points: 4

polish:
  enabled: true  # run polish in `python -m app run` (override with --no-polish)
  mode: gentle  # gentle = fixed-endpoint separation polish; refine = refine-v4; ga-short = warm-start GA
  focus: separation
  phase2_max_rounds: 50
  aggressive_pass: false
  skip_phase1_when_electrode_free: true
  fixed_endpoints: true
  profile: false  # set true or use --profile / --polish-profile for timing breakdown
  # Target centerline clearance (mm): phase-2 pair penalty + layout deficit metric.
  min_trace_separation_mm: 6.0
  ga_generations: 50
  ga_population: 20

postprocess:
  smoothing_strength: 0.1
  arm_inside_margin_mm: 0.0  # signed-distance tolerance for arm-in-mesh flip
  engage_b_threshold_deg: 90
  engage_xy_offset_default_mm: 20
  engage_xy_offset_max_mm: 40
  engage_xy_offset_step_mm: 1
  engage_descent_min_clearance_mm: 20  # min tip clearance during engage Z-down / disengage Z-up legs
  optimize_trace_order: true
  trace_order_method: c_nearest_neighbor  # nearest_neighbor | c_nearest_neighbor
  trace_order_start: first  # first | home
  skip_origin_when_bc_close: true
  c_short_transfer_max_delta_deg: 20
  c_order_xy_weight: 0.05
  # Catch leftover ±(B,C) branch flips (~180°). Allow steep but real scalp curvature.
  axis_max_c_step_deg: 90
  # Calm C near the crown so tip does not serpentine from atan2(nx,ny) jitter.
  normal_path_smooth_alpha: 0.5
  normal_path_smooth_passes: 1
  c_pole_nxy_min: 0.08  # inherit prior XY heading when |n_xy| is below this
  c_max_slew_deg: 12  # max |ΔC| per sample while printing (anti-serpentine)
  terminal_min_points: 4
  matlab_folder: subject_optimized  # relative to data/output/matlab/
