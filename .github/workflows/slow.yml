name: slow



on:

  schedule:

    - cron: "0 6 * * *"

  workflow_dispatch:



jobs:

  slow:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4



      - uses: actions/setup-python@v5

        with:

          python-version: "3.10"

          cache: pip



      - name: Install package and test deps

        run: pip install -e ".[dev]"



      - name: Slow tests (real mesh when fixtures present)

        run: pytest -m slow -v


